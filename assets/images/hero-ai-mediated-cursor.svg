<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AI adoption without changing how engineers work</title>
  <desc id="desc">A LinkedIn-style corporate banner for write-code-by-hand.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.56" stop-color="#e8f2ff"/>
      <stop offset="1" stop-color="#d6e8ff"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10213f"/>
      <stop offset="1" stop-color="#264b78"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#14315d" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="48" y="42" width="1104" height="591" rx="22" fill="#ffffff" opacity="0.72" stroke="#d6e4f5"/>

  <g transform="translate(92 86)">
    <rect x="0" y="0" width="178" height="34" rx="17" fill="#0a66c2"/>
    <text x="89" y="23" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#fff">Q3 OKR: ON TRACK</text>

    <text x="0" y="104" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800" fill="#0b1f3a">AI adoption without</text>
    <text x="0" y="166" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800" fill="#0b1f3a">changing how</text>
    <text x="0" y="228" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800" fill="#0a66c2">engineers work</text>

    <text x="0" y="286" font-family="Inter, Arial, sans-serif" font-size="24" fill="#40546f">Human-written code.</text>
    <text x="0" y="320" font-family="Inter, Arial, sans-serif" font-size="24" fill="#40546f">AI-mediated cursor movement.</text>

    <g transform="translate(0 382)">
      <rect x="0" y="0" width="172" height="86" rx="14" fill="#f7fbff" stroke="#d9e8f8"/>
      <text x="22" y="34" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#0a66c2">+312%</text>
      <text x="22" y="62" font-family="Inter, Arial, sans-serif" font-size="15" fill="#40546f">AI touchpoints</text>

      <rect x="192" y="0" width="172" height="86" rx="14" fill="#f7fbff" stroke="#d9e8f8"/>
      <text x="214" y="34" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#0a66c2">0%</text>
      <text x="214" y="62" font-family="Inter, Arial, sans-serif" font-size="15" fill="#40546f">autocomplete risk</text>

      <rect x="384" y="0" width="214" height="86" rx="14" fill="#f7fbff" stroke="#d9e8f8"/>
      <text x="406" y="34" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#0a66c2">100%</text>
      <text x="406" y="62" font-family="Inter, Arial, sans-serif" font-size="15" fill="#40546f">keyboard sovereignty</text>
    </g>
  </g>

  <g transform="translate(695 112)" filter="url(#shadow)">
    <rect x="0" y="0" width="372" height="258" rx="18" fill="url(#screen)"/>
    <rect x="22" y="24" width="328" height="32" rx="8" fill="#e9f2ff" opacity="0.12"/>
    <circle cx="42" cy="40" r="5" fill="#ff6b6b"/>
    <circle cx="60" cy="40" r="5" fill="#ffd166"/>
    <circle cx="78" cy="40" r="5" fill="#6ee7b7"/>
    <text x="30" y="94" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#9ee7ff">24</text>
    <text x="70" y="94" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#f8fafc">if bucket.len() == limit {</text>
    <text x="30" y="128" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#9ee7ff">25</text>
    <text x="70" y="128" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#f8fafc">    return false;</text>
    <text x="30" y="162" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#9ee7ff">26</text>
    <text x="70" y="162" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#f8fafc">}</text>
    <rect x="66" y="174" width="222" height="2" fill="#62d3ff"/>

    <path d="M275 198 L325 238 L299 244 L286 270 L268 260 L282 234 Z" fill="#ffffff" stroke="#0a66c2" stroke-width="3"/>
  </g>

  <g transform="translate(760 410)" filter="url(#shadow)">
    <rect x="0" y="0" width="305" height="122" rx="18" fill="#ffffff" stroke="#d6e4f5"/>
    <text x="24" y="34" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#0b1f3a">AGENT STATUS</text>
    <text x="24" y="66" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#0a66c2">Line 24 selected</text>
    <text x="24" y="94" font-family="Inter, Arial, sans-serif" font-size="16" fill="#40546f">Awaiting exact human code.</text>
  </g>
</svg>
